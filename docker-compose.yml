services:
  postgres:
    image: postgres:16-alpine
    container_name: ironrent-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sAC8PxTJLVNEe6h7mR5cKz1yZB4Fuvr9
      POSTGRES_DB: ironrent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ironrent"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      target: deps
    container_name: ironrent-migrate
    command: npx prisma migrate deploy
    environment:
      - DATABASE_URL=postgresql://postgres:sAC8PxTJLVNEe6h7mR5cKz1yZB4Fuvr9@postgres:5432/ironrent?schema=public
    depends_on:
      postgres:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    container_name: ironrent-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: ironrent-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/ironrent --ignore-existing;
      mc anonymous set download myminio/ironrent;
      echo 'Bucket ironrent created and configured for public access';
      "

  app:
    build:
      context: .
      target: runner
    container_name: ironrent-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:sAC8PxTJLVNEe6h7mR5cKz1yZB4Fuvr9@postgres:5432/ironrent?schema=public
      - S3_ENDPOINT=http://minio:9000
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
  minio_data:
