services:
  app:
    build: .
    container_name: ironrent-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/ironrent?schema=public
      - S3_ENDPOINT=http://minio:9000
    depends_on:
      postgres:
        condition: service_started
      minio:
        condition: service_healthy

  # Одноразовый контейнер для миграций
  migrate:
    build: .
    container_name: ironrent-migrate
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/ironrent?schema=public
    command: npx prisma migrate deploy
    depends_on:
      postgres:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: ironrent-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ironrent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: ironrent-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Автоматическое создание бакета при старте
  minio-init:
    image: minio/mc:latest
    container_name: ironrent-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/ironrent --ignore-existing;
      mc anonymous set download myminio/ironrent;
      echo 'Bucket ironrent created and configured for public access';
      "

volumes:
  postgres_data:
  minio_data:
